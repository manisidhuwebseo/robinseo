<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Robine SEO Expert</title>

<style>
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f9f9ff;
  --color-text-primary: #26215C;
  --color-text-secondary: #6b6b9a;
  --color-border-tertiary: #e2e2f2;
  --border-radius-md: 8px;
  --border-radius-lg: 14px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
}

.nav {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  border-bottom:1px solid #eee;
}

.logo {
  font-weight:bold;
  color:#534AB7;
}

.hero {
  display:flex;
  padding:40px;
  background:#EEEDFE;
}

.hero-left {
  flex:1;
}

.hero h1 {
  font-size:32px;
  margin-bottom:10px;
}

.btn {
  padding:10px 20px;
  background:#534AB7;
  color:white;
  border:none;
  cursor:pointer;
  margin-top:10px;
}

.section {
  padding:40px;
}

.footer {
  background:#26215C;
  color:white;
  padding:20px;
  text-align:center;
}
</style>

</head>

<body>

<div class="nav">
  <div class="logo">Robine SEO Expert</div>
  <div>Services | Pricing | Contact</div>
</div>

<div class="hero">
  <div class="hero-left">
    <h1>SEO Expert for #1 Google Ranking</h1>
    <p>Grow your business with powerful SEO strategies.</p>
    <button class="btn">Get Free Audit</button>
  </div>
</div>

<div class="section">
  <h2>Services</h2>
  <p>On-page SEO, Link Building, Local SEO, Technical SEO</p>
</div>

<div class="section">
  <h2>Contact</h2>
  <p>Email: robine@robineseoexpert.in</p>
</div>

<div class="footer">
  © 2026 Robine SEO Expert
</div>

</body>
</html>
