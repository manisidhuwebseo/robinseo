<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Webkitlab Technologies - Digital Marketing & Web Development Agency">
    <title>Webkitlab Technologies | Digital Marketing & Web Development</title>

    <!-- Fixed Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="container">
        <nav>
            <a href="#" class="logo">
                <i class="fas fa-code"></i>
                <span>Webkitlab</span>
            </a>
        </nav>
    </div>
</header>

<section class="hero">
    <div class="container">
        <h1>Grow Your Business Online</h1>
        <p>Digital marketing and web development solutions.</p>
    </div>
</section>

<section class="contact" id="contact">
    <div class="container">
        <div class="contact-form">
            <h2>Get in Touch</h2>
            <form id="contactForm" action="https://formspree.io/f/your-id" method="POST">
                <input type="text" name="name" placeholder="Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <textarea name="message" rows="5" required></textarea>
                <button type="submit">Send</button>
            </form>
        </div>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
